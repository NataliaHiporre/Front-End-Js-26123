<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,400;0,600;0,700;0,800;1,100;1,400;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <title>Contacto</title>
  </head>
  <body>
    <header>
      <div class="div-logo"><a class="logo" href="../index.html">LASSO</a></div>

      <nav class="header-nav">
        <ul>
          <li>
            <a href="../index.html">Inicio</a>
          </li>
          <li>
            <a href="./contacto.html">Contacto</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="titulo-contacto text-secondary">Contactanos</h1>

      <form
        class="form-contacto"
        action="https://formspree.io/f/xzdooepk"
        method="POST"
      >
        <div class="grupo-input">
          <label for="email"> Tu email: </label>
          <input id="email" type="email" name="email" />
        </div>
        <div class="grupo-input">
          <label for="mensaje"> Tu mensaje: </label>
          <textarea id="mensaje" name="message"></textarea>
        </div>
        <!-- your other form fields go here -->
        <button class="btn bg-secondary text-dark" type="submit">Enviar</button>
      </form>
    </main>

    <footer>
      <p>
        © 2026 Natalia Fernanda Hiporre. Proyecto realizado para Talento Tech |
        Comisión 26123 - Frontend Js
      </p>
      <nav>
        <ul class="footer-list">
          <li><img src="../img/wpp.png" alt="logo de whatsapp" /></li>
          <li><img src="../img/instagram.png" alt="logo de instagram" /></li>
          <li><img src="../img/facebook.png" alt="logo de facebook" /></li>
        </ul>
      </nav>
    </footer>
  </body>
